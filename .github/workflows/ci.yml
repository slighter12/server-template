name: Go CI Workflow

on:
  # push:
  #   branches:
  #     - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: server-template
  GOLANGCI_LINT_VERSION: v2.4.0

jobs:
  checks:
    name: Run Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum
            go.work.sum

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --config=./.golangci.yaml

      - name: Run tests
        run: go test -race ./...

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build metadata
        id: build-meta
        run: |
          if TAG=$(git describe --tags --exact-match 2>/dev/null); then
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
          echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          pull: true
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE_NAME }}:${{ steps.build-meta.outputs.tag }}
          build-args: |
            VERSION=${{ steps.build-meta.outputs.tag }}
            BUILT=${{ steps.build-meta.outputs.built }}
            GIT_COMMIT=${{ github.sha }}
            IMAGE_NAME=${{ env.IMAGE_NAME }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}
